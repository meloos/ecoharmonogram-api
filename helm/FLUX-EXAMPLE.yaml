---
# Example Flux HelmRelease for deploying ecoharmonogram-api
# Place this in your Flux GitOps repository and update values as needed
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ecoharmonogram-api-source
  namespace: flux-system
spec:
  interval: 10m
  url: https://github.com/meloos/ecoharmonogram-api
  ref:
    tag: v1.0.2
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ecoharmonogram-api
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: ./helm/ecoharmonogram-api
      sourceRef:
        kind: GitRepository
        name: ecoharmonogram-api-source
        namespace: flux-system
  values:
    replicaCount: 1
    image:
      repository: ghcr.io/meloos/ecoharmonogram-api
      tag: "v1.0.2"
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
